schema: spec-driven

context: |
  Tech stack: Python + Textual (TUI framework)
  Este es un proyecto personal de aprendizaje — el usuario prioriza entendimiento sobre velocidad.
  El usuario viene de Node.js/TypeScript y está aprendiendo Python.

rules:
  tasks:
    - Implementar UNA sola tarea por turno, luego detenerse y esperar aprobación explícita del usuario antes de continuar con la siguiente.
    - Al completar una tarea, mostrar un resumen claro de qué se implementó y por qué se tomaron las decisiones técnicas clave, orientado a alguien que aprende Python desde JS/TS.
    - No avanzar a la siguiente tarea hasta que el usuario confirme con "ok", "siguiente", "continúa" o equivalente.

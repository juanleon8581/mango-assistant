categories:
  git:
    shortcut: "g"
    macros:
      create-branch-push:
        shortcut: "cb"
        description: "Create a new branch and push it to origin"
        params:
          - name: branch
            prompt: "Branch name"
        steps:
          - git checkout -b {branch}
          - git push -u origin {branch}
      new-tag-and-push:
        shortcut: "nt"
        description: "Create a new tag and push it to origin"
        params:
          - name: tag
            prompt: "Tag name"
        steps:
          - git tag {tag}
          - git push --tags
      switch-and-pull:
        shortcut: "su"
        description: "Switch branch, fetch and pull"
        params:
          - name: branch
            prompt: "Branch name"
        steps:
          - git checkout {branch}
          - git fetch
          - git pull
      delete-branch-local-remote-and-prune:
        shortcut: "db"
        description: "Delete branch in local and remote, and prune"
        params:
          - name: branch
            prompt: "Branch name"
        steps:
          - git push origin --delete {branch}
          - git branch -D {branch}
          - git fetch --prune
      status:
        shortcut: "st"
        description: "Show git status"
        steps:
          - git status
      log:
        shortcut: "lo"
        description: "Show recent commits"
        steps:
          - git log --oneline -10
  docker:
    shortcut: "d"
    macros:
      up:
        shortcut: "up"
        description: "Start containers"
        steps:
          - docker compose up -d
      down:
        shortcut: "dn"
        description: "Stop containers"
        steps:
          - docker compose down
      logs:
        shortcut: "lg"
        description: "Follow logs for a service"
        params:
          - name: service
            prompt: "Service name"
        steps:
          - docker compose logs -f {service}
